model:
  backbone: mobileone_s2
  feature_channels: 192
  pretrained: true
  pretrained_path: checkpoints/mobileone_s2_unfused.pth.tar
  normalize_input: true
  template_size: 127
  search_size: 287
  output_size: 21
  anchor_stride: 8
  context_amount: 0.5

train:
  dataset_root: data/raw
  batch_size: 8
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.0001
  device: cuda
  checkpoint_dir: checkpoints
  smooth_l1_beta: 1.0

  num_workers: 2
  pin_memory: true

  train_samples_per_epoch: 2048
  translation_jitter: 0.15
  scale_jitter: 0.1

infer:
  checkpoint: checkpoints/best.pth
  video_path: data/input/sample2.mp4
  output_path: data/output/tracked_output.mp4

  confidence_threshold: 0.35
  device: cpu
  display_output: true
  save_output: true
  debug: true

tracking:
  backend: siamapn
  checkpoint: checkpoints/best.pth
  uncertain_confidence_threshold: 0.55
  lost_confidence_threshold: 0.35
  trail_length: 20
  search_radius_scale: 2.0
  selection_aspect_ratio: 0.5
  default_selection_height_fraction: 0.2
  template_crop_scale: 1.0
  # Used by non-SiamAPN/custom search logic. SiamAPN++ uses model.search_size / model.template_size.
  search_crop_scale: 2.0
  track_max_width: 384

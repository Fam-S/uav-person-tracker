model:
  backbone: mobileone_s2
  feature_channels: 192
  pretrained: false
  pretrained_path: null
  normalize_input: true
  template_size: 127
  search_size: 255
  context_amount: 0.5

train:
  dataset_root: data/raw/MTC-AIC4-data
  batch_size: 8
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.0001
  device: cuda
  checkpoint_dir: checkpoints
  smooth_l1_beta: 1.0

  num_workers: 2
  pin_memory: true

  train_samples_per_epoch: 512

infer:
  checkpoint: checkpoints/best.pth
  video_path: data/input/sample2.mp4
  output_path: data/output/tracked_output.mp4

  confidence_threshold: 0.35
  device: cpu
  display_output: true
  save_output: true
  debug: true

tracking:
  backend: csrt
  checkpoint: null
  uncertain_confidence_threshold: 0.55
  lost_confidence_threshold: 0.35
  trail_length: 20
  search_radius_scale: 2.0
  selection_aspect_ratio: 0.5
  default_selection_height_fraction: 0.2
  template_crop_scale: 1.0
  search_crop_scale: 2.0
  track_max_width: 384

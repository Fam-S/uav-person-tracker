model:
  backbone: small
  feature_channels: 96
  pretrained: true
  normalize_input: true
  template_size: 127
  search_size: 255
  context_amount: 0.5

train:
  dataset_root: data/raw/UAV123
  processed_root: data/processed

  batch_size: 8
  epochs: 10
  learning_rate: 0.0001
  backbone_learning_rate: 0.00001
  weight_decay: 0.0001

  freeze_backbone: false
  unfreeze_last_n_backbone_blocks: 0

  device: cuda
  checkpoint_dir: checkpoints
  log_dir: logs

  cls_weight: 1.0
  reg_weight: 5.0
  smooth_l1_beta: 1.0

  num_workers: 2
  pin_memory: true

  train_samples_per_epoch: 512
  val_samples_per_epoch: 128

infer:
  checkpoint: checkpoints/best.pth
  video_path: data/input/sample2.mp4
  output_path: data/output/tracked_output.mp4

  confidence_threshold: 0.35
  device: cpu
  display_output: true
  save_output: true
  debug: true
